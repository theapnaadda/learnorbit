                        const timeA = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                        const timeB = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                        return timeB - timeA;

                    setMaterials(fetchedMaterials);

                            id: key,
                            ...data[key],
                            messages: data[key].messages ? Object.values(data[key].messages).sort((a, b) => a.timestamp - b.timestamp) : []
                        })).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                        setSupportChats(chatsArray);

                        {activeTab === 'dashboard' && (
                            <div className="fade-in relative z-10">
                                <h2 className="text-4xl font-black mb-10 text-white tracking-tight drop-shadow-md">System <span className="text-gradient">Overview</span></h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-14">
                                    <div className="glass-panel p-8 rounded-[2rem] border border-white/5 flex items-center gap-6 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,0,0,0.5)] transition-all duration-500 group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-[40px] pointer-events-none"></div>
                                        <div className="w-20 h-20 bg-primary/20 text-primary rounded-[1.5rem] flex items-center justify-center text-4xl border border-primary/30 shadow-inner shadow-[0_0_20px_rgba(99,102,241,0.2)] group-hover:scale-110 group-hover:rotate-6 transition-transform relative z-10"><i className="fa-solid fa-file-pdf drop-shadow-md"></i></div><div className="relative z-10"><div className="text-5xl font-black text-white drop-shadow-md tracking-tighter">{stats.notes}</div><div className="text-xs text-gray-400 font-black uppercase tracking-widest mt-2">Total Notes</div></div>
                                    </div>
                                    <div className="glass-panel p-8 rounded-[2rem] border border-white/5 flex items-center gap-6 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,0,0,0.5)] transition-all duration-500 group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-secondary/10 rounded-full blur-[40px] pointer-events-none"></div>
                                        <div className="w-20 h-20 bg-secondary/20 text-secondary rounded-[1.5rem] flex items-center justify-center text-4xl border border-secondary/30 shadow-inner shadow-[0_0_20px_rgba(6,182,212,0.2)] group-hover:scale-110 group-hover:-rotate-6 transition-transform relative z-10"><i className="fa-solid fa-dumbbell drop-shadow-md"></i></div><div className="relative z-10"><div className="text-5xl font-black text-white drop-shadow-md tracking-tighter">{stats.practice}</div><div className="text-xs text-gray-400 font-black uppercase tracking-widest mt-2">Practice Qs</div></div>
                                    </div>
                                    <div className="glass-panel p-8 rounded-[2rem] border border-white/5 flex items-center gap-6 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,0,0,0.5)] transition-all duration-500 group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-accent/10 rounded-full blur-[40px] pointer-events-none"></div>
                                        <div className="w-20 h-20 bg-accent/20 text-accent rounded-[1.5rem] flex items-center justify-center text-4xl border border-accent/30 shadow-inner shadow-[0_0_20px_rgba(139,92,246,0.2)] group-hover:scale-110 group-hover:rotate-6 transition-transform relative z-10"><i className="fa-solid fa-layer-group drop-shadow-md"></i></div><div className="relative z-10"><div className="text-5xl font-black text-white drop-shadow-md tracking-tighter">{SUBJECTS_DATA.length * 2}</div><div className="text-xs text-gray-400 font-black uppercase tracking-widest mt-2">Total Subjects</div></div>
                                    </div>
                                </div>
                                <h3 className="text-2xl font-black mb-8 text-white drop-shadow-md tracking-tight"><i className="fa-solid fa-clock-rotate-left mr-3 text-primary"></i>Recent Uploads</h3>
                                <div className="glass-panel rounded-[2rem] border border-white/5 overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-[#0a0d16]/80 text-gray-400 text-xs uppercase tracking-widest font-black border-b border-white/5 backdrop-blur-md"><tr><th className="p-6">Type</th><th className="p-6">Class</th><th className="p-6">Subject</th><th className="p-6 hidden sm:table-cell">Chapter</th><th className="p-6">Title</th></tr></thead>
                                        <tbody className="text-sm font-bold">
                                            {materials.slice(0, 5).map(m => (
                                                <tr key={m.id} className="border-t border-white/5 hover:bg-white/5 transition-colors duration-300"><td className="p-6"><span className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase border shadow-inner ${m.type==='note'?'bg-primary/10 text-primary border-primary/30':'bg-secondary/10 text-secondary border-secondary/30'}`}>{m.type}</span></td><td className="p-6 font-black text-gray-300">{m.classLevel}</td><td className="p-6 text-gray-400">{m.subject}</td><td className="p-6 text-gray-500 hidden sm:table-cell">{m.chapter}</td><td className="p-6 font-bold text-white drop-shadow-sm">{m.title}</td></tr>
                                            ))}
                                            {materials.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-gray-500 border-t border-white/5 font-bold">No data available</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'manage_notes' && renderList('note')}
                        {activeTab === 'manage_practice' && renderList('practice')}
                        {activeTab === 'add_note' && renderForm('note')}
                        {activeTab === 'add_practice' && renderForm('practice')}

                        {activeTab === 'customer_support' && (
                            <div className="fade-in h-full flex flex-col relative z-10" style={{ minHeight: 'calc(100vh - 120px)' }}>
                                <div className="flex items-center gap-4 mb-8 shrink-0">
                                    <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl shadow-inner bg-emerald-500/20 text-emerald-500 border border-emerald-500/30 shadow-[0_0_20px_rgba(16,185,129,0.2)] backdrop-blur-md"><i className="fa-solid fa-headset drop-shadow-md"></i></div>
                                    <h2 className="text-4xl font-black text-white tracking-tight drop-shadow-md">Customer Support Inbox</h2>
                                </div>

                                {!activeChatUser ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                                        {supportChats.length === 0 ? <div className="col-span-full text-center py-16 text-gray-500 border border-dashed border-white/10 rounded-[2rem] bg-white/5 font-bold h-max backdrop-blur-md">No active support chats.</div> :
                                        supportChats.map(chat => {
                                            const lastMsg = chat.messages[chat.messages.length - 1];
                                            return (
                                                <div key={chat.id} onClick={() => {
                                                    const currentData = supportChats.find(c => c.id === chat.id);
                                                    setActiveChatUser(currentData);
                                                }} className="glass-panel p-6 rounded-[2rem] border border-white/5 cursor-pointer hover:border-emerald-500/50 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_15px_30px_rgba(0,0,0,0.5)] active:scale-95 group h-max">
                                                    <div className="flex items-center justify-between mb-3">
                                                        <h4 className="font-bold text-white truncate max-w-[80%] drop-shadow-sm text-lg"><i className="fa-solid fa-user text-gray-500 mr-3 group-hover:text-emerald-400 transition-colors drop-shadow-md"></i>{chat.userEmail || 'User'}</h4>
                                                        <button onClick={(e) => { e.stopPropagation(); deleteSupportChat(chat.id); }} className="text-gray-500 hover:text-red-500 transition-colors p-2 active:scale-90"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                    <p className="text-sm text-gray-400 truncate font-medium"><span className={`font-black ${lastMsg?.sender === 'admin' ? 'text-emerald-400' : 'text-primary'}`}>{lastMsg?.sender === 'admin' ? 'You: ' : 'User: '}</span>{lastMsg?.text || 'No messages'}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="glass-panel flex-1 rounded-[2.5rem] border border-white/5 flex flex-col overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.8)] mb-6" style={{ height: 'calc(100vh - 200px)' }}>
                                        <div className="bg-[#0a0d16]/90 p-5 flex justify-between items-center border-b border-white/5 shrink-0 backdrop-blur-xl">
                                            <div className="flex items-center gap-4">
                                                <button onClick={() => setActiveChatUser(null)} className="w-10 h-10 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all active:scale-90"><i className="fa-solid fa-arrow-left"></i></button>
                                                <div><h4 className="font-bold text-white text-base drop-shadow-sm">{activeChatUser.userEmail || 'User'}</h4><span className="text-[10px] text-emerald-400 font-black uppercase tracking-widest drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]">Active Chat</span></div>
                                            </div>
                                            <button onClick={() => deleteSupportChat(activeChatUser.id)} className="text-xs bg-red-500/10 text-red-500 px-4 py-2 rounded-xl font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition-all shadow-inner hover:shadow-[0_0_15px_rgba(239,68,68,0.5)] active:scale-95 uppercase tracking-wider"><i className="fa-solid fa-trash mr-2"></i>Delete</button>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-6 space-y-5 bg-black/20">
                                            {activeChatUser.messages.map((m, i) => (
                                                <div key={i} className={`max-w-[80%] p-4 rounded-2xl text-sm leading-relaxed shadow-lg border ${m.sender === 'admin' ? 'bg-gradient-to-br from-emerald-500 to-teal-500 text-[#05070f] font-medium self-end rounded-br-sm ml-auto border-transparent shadow-[0_10px_20px_rgba(16,185,129,0.2)]' : 'bg-[#0a0d16]/80 backdrop-blur-sm text-gray-200 self-start rounded-bl-sm border-white/10'}`}>
                                                    {m.text}
                                                </div>
                                            ))}
                                            <div ref={adminEndRef} />
                                        </div>
                                        <div className="p-5 bg-[#0a0d16]/90 border-t border-white/5 flex gap-4 shrink-0 backdrop-blur-xl">
                                            <input type="text" value={adminReply} onChange={(e) => setAdminReply(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendAdminReply()} placeholder="Reply to user..." className="flex-1 bg-black/50 border border-white/10 text-white rounded-xl px-5 py-3.5 outline-none focus:border-emerald-500 transition-all shadow-inner font-bold text-sm focus:shadow-[0_0_20px_rgba(16,185,129,0.3)]" />
                                            <button onClick={sendAdminReply} className="btn-premium bg-gradient-to-br from-emerald-500 to-teal-400 hover:from-emerald-400 hover:to-teal-300 text-[#05070f] font-black w-14 sm:w-16 rounded-xl transition-all active:scale-90 shadow-[0_10px_25px_rgba(16,185,129,0.4)] flex items-center justify-center text-xl"><i className="fa-solid fa-paper-plane"></i></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'ai_settings' && (
                            <div className="glass-panel p-10 md:p-12 rounded-[3rem] border border-white/5 max-w-2xl fade-in shadow-[0_30px_60px_rgba(0,0,0,0.6)] relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-accent/20 rounded-full blur-[100px] pointer-events-none"></div>
                                <div className="flex items-center gap-4 mb-8 border-b border-white/5 pb-6 relative z-10"><div className="w-16 h-16 bg-accent/20 text-accent rounded-[1.5rem] flex items-center justify-center text-3xl border border-accent/30 shadow-[0_0_25px_rgba(139,92,246,0.3)] backdrop-blur-md shadow-inner"><i className="fa-solid fa-microchip drop-shadow-md"></i></div><h3 className="text-3xl font-black text-white tracking-tight drop-shadow-md">AI Configuration</h3></div>
                                <p className="text-gray-300 mb-10 text-base leading-relaxed relative z-10 font-medium drop-shadow-sm">Securely store your OpenRouter API Key and Model ID to empower the platform's Chatbot. This allows students to ask conceptual questions in real-time.</p>
                                <div className="mb-6 relative z-10">
                                    <label className="block text-xs font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">OpenRouter API Key <i className="fa-solid fa-lock ml-1 text-green-400 drop-shadow-[0_0_5px_rgba(74,222,128,0.8)]"></i></label>
                                    <input type="password" value={aiKey} onChange={(e) => setAiKey(e.target.value)} className="w-full bg-[#0a0d16]/80 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-accent font-mono tracking-wider transition-all focus:shadow-[0_0_25px_rgba(139,92,246,0.2)] backdrop-blur-sm" placeholder="sk-or-v1-..." />
                                </div>
                                <div className="mb-10 relative z-10">
                                    <label className="block text-xs font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Model ID <i className="fa-solid fa-robot ml-1 text-accent drop-shadow-[0_0_5px_rgba(139,92,246,0.8)]"></i></label>
                                    <input type="text" value={aiModel} onChange={(e) => setAiModel(e.target.value)} className="w-full bg-[#0a0d16]/80 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-accent font-mono tracking-wider transition-all focus:shadow-[0_0_25px_rgba(139,92,246,0.2)] backdrop-blur-sm" placeholder="e.g., google/gemini-pro" />
                                </div>
                                <button onClick={handleSaveAi} disabled={loading} className="btn-premium w-full bg-gradient-to-r from-accent to-primary text-white py-4 rounded-2xl font-black transition-all shadow-[0_15px_30px_rgba(139,92,246,0.4)] flex items-center justify-center relative z-10 active:scale-95 text-lg border border-white/10 hover:shadow-[0_20px_40px_rgba(139,92,246,0.6)]">{loading ? <i className="fa-solid fa-spinner fa-spin text-xl"></i> : <><i className="fa-solid fa-shield-check mr-3 text-lg"></i> Update Secure Key</>}</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const App = () => {
            const [route, setRoute] = useState('home'); 
            const [activeClass, setActiveClass] = useState('11');
            const [selectedSubject, setSelectedSubject] = useState(null);

            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [chatOpen, setChatOpen] = useState(false);
            const [confirmSignout, setConfirmSignout] = useState(false);
            const [toast, setToast] = useState(null); 

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if (usr && usr.email === 'thepremanshu@gmail.com') setIsAdmin(true);
                    else { setIsAdmin(false); if(route === 'admin') handleNavigate('home'); }
                });
                return () => unsubscribe();
            }, [route]);

            // Ambient interactive cursor glow (Vanilla JS hook for performance)
            useEffect(() => {
                const glow = document.getElementById('cursor-glow');
                const handleMove = (e) => {
                    if (glow) {
                        glow.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
                    }
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            const handleNavigate = (newRoute, targetSubject = undefined) => {
                setRoute(newRoute);
                if (targetSubject !== undefined) {
                    setSelectedSubject(targetSubject);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleClassChange = (newClass) => { setActiveClass(newClass); };
            const triggerSignOut = () => setConfirmSignout(true);
            const executeSignOut = async () => { await auth.signOut(); setConfirmSignout(false); showToast("Logged out successfully.", "success"); handleNavigate('home'); };
            
            const showToast = (message, type = 'success') => setToast({ message, type });

            const showMobileNav = route !== 'admin';

            return (
                <div className={`flex flex-col min-h-screen relative ${showMobileNav ? 'mobile-pb' : ''}`}>
                    {/* Ambient Cursor Glow (Desktop Only) */}
                    <div id="cursor-glow" className="pointer-events-none fixed top-0 left-0 w-[800px] h-[800px] bg-primary/10 rounded-full blur-[120px] z-50 transition-transform duration-75 ease-out mix-blend-screen hidden lg:block" style={{ willChange: 'transform' }}></div>

                    <ToastMessage toast={toast} onClose={() => setToast(null)} />
                    <ConfirmModal isOpen={confirmSignout} message="Are you sure you want to securely log out?" onConfirm={executeSignOut} onCancel={() => setConfirmSignout(false)} />
                    
                    <Navbar navigate={handleNavigate} user={user} isAdmin={isAdmin} handleSignOut={triggerSignOut} route={route} />
                    
                    <main className="flex-grow">
                        {route === 'home' && <HomePage navigate={handleNavigate} setChatOpen={setChatOpen} />}
                        {route === 'about' && <AboutPage />}
                        {route === 'auth' && <AuthPage navigate={handleNavigate} showToast={showToast} />}
                        {route === 'support' && <SupportPage user={user} navigate={handleNavigate} showToast={showToast} />}
                        {route === 'subjects' && <SubjectsPage activeClass={activeClass} handleClassChange={handleClassChange} selectedSubject={selectedSubject} handleSubjectSelect={(s) => handleNavigate('subjects', s)} />}
                        {route === 'admin' && isAdmin && <AdminDashboard showToast={showToast} />}
                    </main>

                    {route !== 'admin' && route !== 'auth' && <Chatbot isOpen={chatOpen} setIsOpen={setChatOpen} />}
                    
                    {route !== 'admin' && <Footer navigate={handleNavigate} />}
                    {showMobileNav && <MobileNav navigate={handleNavigate} route={route} user={user} isAdmin={isAdmin} handleSignOut={triggerSignOut} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

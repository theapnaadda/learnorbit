            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const handleSend = async () => {
                if (!input.trim()) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);

                if(!input.trim()) return;

                setInput(''); 
                
                try {
                    const chatRef = rtdb.ref(`support_chats/${user.uid}`);

                    if(!snap.exists()) {
                        const autoReply = { sender: 'admin', text: 'Thank You for Contacting us! Our Customer Care Agent will shortly assist you and solve your problem!', timestamp: Date.now() + 1000 };
                        
                        await chatRef.set({

                        <div key={m.id} className="glass-panel p-5 rounded-2xl border border-gray-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-gray-600 transition bg-gray-900/60 hover:bg-gray-800 active:scale-[0.99] shadow-sm hover:shadow-lg" style={{animationDelay: `${index * 0.05}s`}}>
                            <div className="flex items-start gap-4 w-full">
                                <div className="w-12 h-12 bg-gray-900 border border-gray-700 rounded-xl flex items-center justify-center text-gray-400 font-black shrink-0 shadow-inner">{m.classLevel}</div>
                                <div className="flex-grow">
                                    <h4 className="font-bold text-lg text-white mb-1">{m.title}</h4>
                                    <div className="flex flex-wrap gap-2 text-xs font-bold text-gray-400">
                                        <span className="bg-black/50 px-2 py-1 rounded border border-gray-700">{m.subject}</span><span className="bg-black/50 px-2 py-1 rounded border border-gray-700">{m.chapter}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto justify-end mt-2 md:mt-0 pt-3 md:pt-0 border-t md:border-0 border-gray-800">
                                <a href={m.pdfLink} target="_blank" className="p-3 bg-gray-800 border border-gray-700 hover:bg-gray-700 rounded-xl text-white transition flex-1 md:flex-none text-center active:scale-90" title="Test Link"><i className="fa-solid fa-arrow-up-right-from-square"></i></a>
                                <button onClick={() => {setForm(m); setActiveTab(type==='note'?'add_note':'add_practice')}} className="p-3 bg-blue-500/10 border border-blue-500/20 text-blue-400 hover:bg-blue-500 hover:text-white rounded-xl transition flex-1 md:flex-none text-center active:scale-90" title="Edit"><i className="fa-solid fa-pen"></i></button>
                                <button onClick={() => handleDelete(m.id, type)} className="p-3 bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500 hover:text-white rounded-xl transition flex-1 md:flex-none text-center active:scale-90" title="Delete"><i className="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    ))}
                    {materials.filter(m => m.type === type).length === 0 && <div className="text-center py-12 text-gray-500 border border-dashed border-gray-700 rounded-3xl bg-gray-900/40 font-bold">No {type} found in database.</div>}
                </div>
            );

            return (
                <div className="flex flex-col md:flex-row min-h-[85vh] relative">
                    <ConfirmModal isOpen={confirmData.isOpen} message={confirmData.msg} onConfirm={confirmData.action} onCancel={() => setConfirmData({ isOpen: false })} />

                    <aside className="hidden md:block w-72 glass-panel border-r border-gray-800 p-6 z-10 relative bg-gray-900/80">
                        <div className="text-gray-500 uppercase text-xs font-black mb-6 tracking-widest pl-2">Admin Dashboard</div>
                        <nav className="flex flex-col gap-2">
                            {adminNavItems.map(item => (
                                <button key={item.id} onClick={() => { if(item.id.includes('add')) { setForm({ id: null, classLevel: '11', subject: SUBJECTS_DATA[0].name, chapter: CHAPTERS_DATA['11'][SUBJECTS_DATA[0].name][0], title: '', pdfLink: '' }); } setActiveTab(item.id); setActiveChatUser(null); }} className={`flex items-center gap-3 px-5 py-3.5 rounded-xl font-bold transition-all active:scale-95 ${activeTab === item.id ? 'bg-primary text-white shadow-lg shadow-primary/30 scale-[1.02]' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}`}>
                                    <i className={`fa-solid ${item.icon} w-5 text-center`}></i> {item.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <div className="md:hidden fixed bottom-0 left-0 w-full glass-panel border-t border-gray-800 z-50 flex overflow-x-auto no-scrollbar py-2 px-2 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] bg-gray-900/90 backdrop-blur-xl">
                        {adminNavItems.map(item => (
                            <button key={item.id} onClick={() => { if(item.id.includes('add')) { setForm({ id: null, classLevel: '11', subject: SUBJECTS_DATA[0].name, chapter: CHAPTERS_DATA['11'][SUBJECTS_DATA[0].name][0], title: '', pdfLink: '' }); } setActiveTab(item.id); setActiveChatUser(null); }} className={`flex flex-col items-center gap-1 min-w-[70px] flex-shrink-0 p-2 rounded-xl transition-all active:scale-90 ${activeTab === item.id ? 'text-primary bg-primary/10 border border-primary/20' : 'text-gray-500'}`}>
                                <i className={`fa-solid ${item.icon} text-lg`}></i><span className="text-[9px] font-bold uppercase tracking-wider">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    <main className="flex-1 p-6 md:p-10 mb-20 md:mb-0">
                        {activeTab === 'dashboard' && (
                            <div className="fade-in">
                                <h2 className="text-3xl font-black mb-8 text-white tracking-tight">System <span className="text-gradient">Overview</span></h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                                    <div className="glass-panel p-6 rounded-3xl border border-gray-800 flex items-center gap-5 hover-glow transition bg-gray-900/60 hover:bg-gray-800"><div className="w-16 h-16 bg-primary/20 text-primary rounded-2xl flex items-center justify-center text-3xl border border-primary/20 shadow-inner"><i className="fa-solid fa-file-pdf"></i></div><div><div className="text-4xl font-black text-white">{stats.notes}</div><div className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Total Notes</div></div></div>
                                    <div className="glass-panel p-6 rounded-3xl border border-gray-800 flex items-center gap-5 hover-glow transition bg-gray-900/60 hover:bg-gray-800"><div className="w-16 h-16 bg-secondary/20 text-secondary rounded-2xl flex items-center justify-center text-3xl border border-secondary/20 shadow-inner"><i className="fa-solid fa-dumbbell"></i></div><div><div className="text-4xl font-black text-white">{stats.practice}</div><div className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Practice Qs</div></div></div>
                                    <div className="glass-panel p-6 rounded-3xl border border-gray-800 flex items-center gap-5 hover-glow transition bg-gray-900/60 hover:bg-gray-800"><div className="w-16 h-16 bg-accent/20 text-accent rounded-2xl flex items-center justify-center text-3xl border border-accent/20 shadow-inner"><i className="fa-solid fa-layer-group"></i></div><div><div className="text-4xl font-black text-white">{SUBJECTS_DATA.length * 2}</div><div className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Total Subjects</div></div></div>
                                </div>
                                <h3 className="text-xl font-black mb-6 text-white"><i className="fa-solid fa-clock-rotate-left mr-2 text-primary"></i>Recent Uploads</h3>
                                <div className="glass-panel rounded-3xl border border-gray-800 overflow-hidden shadow-xl bg-gray-900/60">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-black/50 text-gray-400 text-xs uppercase tracking-widest font-black border-b border-gray-800"><tr><th className="p-5">Type</th><th className="p-5">Class</th><th className="p-5">Subject</th><th className="p-5 hidden sm:table-cell">Chapter</th><th className="p-5">Title</th></tr></thead>
                                        <tbody className="text-sm font-medium">
                                            {materials.slice(0, 5).map(m => (
                                                <tr key={m.id} className="border-t border-gray-800 hover:bg-gray-800/80 transition-colors"><td className="p-5"><span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase border ${m.type==='note'?'bg-primary/10 text-primary border-primary/20':'bg-secondary/10 text-secondary border-secondary/20'}`}>{m.type}</span></td><td className="p-5 font-black text-gray-300">{m.classLevel}</td><td className="p-5 text-gray-400">{m.subject}</td><td className="p-5 text-gray-500 hidden sm:table-cell">{m.chapter}</td><td className="p-5 font-bold text-white">{m.title}</td></tr>
                                            ))}
                                            {materials.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-gray-500 border-t border-gray-800 font-bold">No data available</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'manage_notes' && renderList('note')}
                        {activeTab === 'manage_practice' && renderList('practice')}
                        {activeTab === 'add_note' && renderForm('note')}
                        {activeTab === 'add_practice' && renderForm('practice')}

                        {activeTab === 'customer_support' && (
                            <div className="fade-in h-full flex flex-col" style={{ minHeight: 'calc(100vh - 120px)' }}>
                                <div className="flex items-center gap-3 mb-6 shrink-0">
                                    <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner bg-emerald-500/20 text-emerald-500 border border-emerald-500/20"><i className="fa-solid fa-headset"></i></div>
                                    <h2 className="text-3xl font-black text-white">Customer Support Inbox</h2>
                                </div>

                                {!activeChatUser ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
                                        {supportChats.length === 0 ? <div className="col-span-full text-center py-12 text-gray-500 border border-dashed border-gray-700 rounded-3xl bg-gray-900/40 font-bold h-max">No active support chats.</div> :
                                        supportChats.map(chat => {
                                            const lastMsg = chat.messages[chat.messages.length - 1];
                                            return (
                                                <div key={chat.id} onClick={() => {
                                                    const currentData = supportChats.find(c => c.id === chat.id);
                                                    setActiveChatUser(currentData);
                                                }} className="glass-panel p-5 rounded-2xl border border-gray-800 cursor-pointer hover:border-emerald-500/50 transition-colors bg-gray-900/60 hover:bg-gray-800 active:scale-95 shadow-sm group h-max">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <h4 className="font-bold text-white truncate max-w-[80%]"><i className="fa-solid fa-user text-gray-500 mr-2 group-hover:text-emerald-400 transition-colors"></i>{chat.userEmail || 'User'}</h4>
                                                        <button onClick={(e) => { e.stopPropagation(); deleteSupportChat(chat.id); }} className="text-gray-500 hover:text-red-500 transition-colors p-2"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                    <p className="text-sm text-gray-400 truncate"><span className={`font-bold ${lastMsg?.sender === 'admin' ? 'text-emerald-400' : 'text-primary'}`}>{lastMsg?.sender === 'admin' ? 'You: ' : 'User: '}</span>{lastMsg?.text || 'No messages'}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="glass-panel flex-1 rounded-3xl border border-gray-800 flex flex-col overflow-hidden shadow-2xl bg-gray-900/80 mb-6" style={{ height: 'calc(100vh - 200px)' }}>
                                        <div className="bg-gray-800 p-4 flex justify-between items-center border-b border-gray-700 shrink-0">
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => setActiveChatUser(null)} className="w-8 h-8 flex items-center justify-center bg-gray-900 rounded-full text-gray-400 hover:text-white transition-colors"><i className="fa-solid fa-arrow-left"></i></button>
                                                <div><h4 className="font-bold text-white text-sm">{activeChatUser.userEmail || 'User'}</h4><span className="text-[10px] text-emerald-400 font-bold uppercase tracking-wider">Active Chat</span></div>
                                            </div>
                                            <button onClick={() => deleteSupportChat(activeChatUser.id)} className="text-sm bg-red-500/10 text-red-500 px-3 py-1.5 rounded-lg font-bold hover:bg-red-500 hover:text-white transition-colors"><i className="fa-solid fa-trash mr-1.5"></i>Delete</button>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-5 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-opacity-5">
                                            {activeChatUser.messages.map((m, i) => (
                                                <div key={i} className={`max-w-[80%] p-3.5 rounded-2xl text-sm leading-relaxed shadow-sm ${m.sender === 'admin' ? 'bg-emerald-600 text-white self-end rounded-br-sm ml-auto' : 'bg-gray-800 text-gray-200 self-start rounded-bl-sm border border-gray-700 shadow-md'}`}>
                                                    {m.text}
                                                </div>
                                            ))}
                                            <div ref={adminEndRef} />
                                        </div>
                                        <div className="p-4 bg-gray-900 border-t border-gray-800 flex gap-3 shrink-0">
                                            <input type="text" value={adminReply} onChange={(e) => setAdminReply(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendAdminReply()} placeholder="Reply to user..." className="flex-1 bg-black/50 border border-gray-700 text-white rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition shadow-inner font-medium text-sm" />
                                            <button onClick={sendAdminReply} className="bg-emerald-500 hover:bg-emerald-400 text-gray-900 font-black w-12 rounded-xl transition-colors active:scale-90 shadow-lg flex items-center justify-center"><i className="fa-solid fa-paper-plane"></i></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'ai_settings' && (
                            <div className="glass-panel p-8 rounded-3xl border border-gray-800 max-w-xl fade-in shadow-xl relative overflow-hidden bg-gray-900/80">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-accent/20 rounded-full blur-3xl"></div>
                                <div className="flex items-center gap-3 mb-6 border-b border-gray-800 pb-4 relative z-10"><div className="w-12 h-12 bg-accent/20 text-accent rounded-2xl flex items-center justify-center text-2xl border border-accent/20 shadow-inner"><i className="fa-solid fa-microchip"></i></div><h3 className="text-2xl font-black text-white">AI Configuration</h3></div>
                                <p className="text-gray-400 mb-8 text-sm leading-relaxed relative z-10 font-medium">Securely store your OpenRouter API Key and Model ID to empower the platform's Chatbot. This allows students to ask conceptual questions in real-time.</p>
                                <div className="mb-4 relative z-10">
                                    <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">OpenRouter API Key <i className="fa-solid fa-lock ml-1 text-green-400"></i></label>
                                    <input type="password" value={aiKey} onChange={(e) => setAiKey(e.target.value)} className="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-accent font-mono tracking-wider transition focus:bg-gray-900 focus:shadow-[0_0_15px_rgba(139,92,246,0.2)]" placeholder="sk-or-v1-..." />
                                </div>
                                <div className="mb-6 relative z-10">
                                    <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Model ID <i className="fa-solid fa-robot ml-1 text-accent"></i></label>
                                    <input type="text" value={aiModel} onChange={(e) => setAiModel(e.target.value)} className="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-accent font-mono tracking-wider transition focus:bg-gray-900 focus:shadow-[0_0_15px_rgba(139,92,246,0.2)]" placeholder="e.g., google/gemini-pro" />
                                </div>
                                <button onClick={handleSaveAi} disabled={loading} className="w-full bg-gradient-to-r from-accent to-primary hover:opacity-90 text-white py-4 rounded-xl font-black transition shadow-lg shadow-accent/30 flex items-center justify-center relative z-10 active:scale-95 text-lg">{loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-shield-check mr-2"></i> Update Secure Key</>}</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const App = () => {
            // Replaced localStorage retrieval with fresh initial states to clear on reload. 
            // The Auth state silently stays logged in, solving the issue beautifully.
            const [route, setRoute] = useState('home'); 
            const [activeClass, setActiveClass] = useState('11');
            const [selectedSubject, setSelectedSubject] = useState(null);

            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [chatOpen, setChatOpen] = useState(false);
            const [confirmSignout, setConfirmSignout] = useState(false);
            const [toast, setToast] = useState(null); 

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if (usr && usr.email === 'thepremanshu@gmail.com') setIsAdmin(true);
                    else { setIsAdmin(false); if(route === 'admin') handleNavigate('home'); }
                });
                return () => unsubscribe();
            }, [route]);

            const handleNavigate = (newRoute, targetSubject = undefined) => {
                setRoute(newRoute);
                if (targetSubject !== undefined) {
                    setSelectedSubject(targetSubject);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleClassChange = (newClass) => { setActiveClass(newClass); };
            const triggerSignOut = () => setConfirmSignout(true);
            const executeSignOut = async () => { await auth.signOut(); setConfirmSignout(false); showToast("Logged out successfully.", "success"); handleNavigate('home'); };
            
            const showToast = (message, type = 'success') => setToast({ message, type });

            const showMobileNav = route !== 'admin';

            return (
                <div className={`flex flex-col min-h-screen relative ${showMobileNav ? 'mobile-pb' : ''}`}>
                    <ToastMessage toast={toast} onClose={() => setToast(null)} />
                    <ConfirmModal isOpen={confirmSignout} message="Are you sure you want to securely log out?" onConfirm={executeSignOut} onCancel={() => setConfirmSignout(false)} />
                    
                    <Navbar navigate={handleNavigate} user={user} isAdmin={isAdmin} handleSignOut={triggerSignOut} route={route} />
                    
                    <main className="flex-grow">
                        {route === 'home' && <HomePage navigate={handleNavigate} setChatOpen={setChatOpen} />}
                        {route === 'about' && <AboutPage />}
                        {route === 'auth' && <AuthPage navigate={handleNavigate} showToast={showToast} />}
                        {route === 'support' && <SupportPage user={user} navigate={handleNavigate} showToast={showToast} />}
                        {route === 'subjects' && <SubjectsPage activeClass={activeClass} handleClassChange={handleClassChange} selectedSubject={selectedSubject} handleSubjectSelect={(s) => handleNavigate('subjects', s)} />}
                        {route === 'admin' && isAdmin && <AdminDashboard showToast={showToast} />}
                    </main>

                    {route !== 'admin' && route !== 'auth' && <Chatbot isOpen={chatOpen} setIsOpen={setChatOpen} />}
                    
                    {route !== 'admin' && <Footer navigate={handleNavigate} />}
                    {showMobileNav && <MobileNav navigate={handleNavigate} route={route} user={user} isAdmin={isAdmin} handleSignOut={triggerSignOut} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
